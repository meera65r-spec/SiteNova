<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Website Builder</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
height:100vh;
display:flex;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
}

/* LEFT SIDE CHAT */

.chat{
width:45%;
display:flex;
flex-direction:column;
backdrop-filter:blur(20px);
background:rgba(255,255,255,0.05);
border-right:1px solid rgba(255,255,255,0.1);
}

.header{
padding:22px;
font-size:22px;
font-weight:600;
letter-spacing:1px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.messages{
flex:1;
overflow-y:auto;
padding:25px;
}

.msg{
padding:14px 18px;
border-radius:14px;
margin-bottom:14px;
max-width:75%;
animation:fadeIn .3s ease;
}

.ai{
background:rgba(255,255,255,0.12);
}

.user{
background:#ff7b00;
margin-left:auto;
}

/* INPUT */

.inputBox{
display:flex;
padding:16px;
border-top:1px solid rgba(255,255,255,0.1);
}

.inputBox input{
flex:1;
padding:13px;
border:none;
border-radius:10px;
outline:none;
font-size:15px;
background:rgba(255,255,255,0.08);
color:white;
}

.send{
width:42px;
height:42px;
margin-left:10px;
border:none;
border-radius:50%;
background:linear-gradient(45deg,#ff7b00,#ff9a3c);
color:white;
font-size:18px;
cursor:pointer;
}

/* RIGHT SIDE PREVIEW */

.preview{
width:55%;
display:flex;
flex-direction:column;
background:white;
color:black;
}

.previewTop{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 18px;
background:#f1f1f1;
font-weight:600;
}

.createBtn{
background:linear-gradient(45deg,#ff7b00,#ff9a3c);
border:none;
padding:8px 18px;
border-radius:8px;
color:white;
cursor:pointer;
}

iframe{
flex:1;
border:none;
}

/* ANIMATION */

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

</style>

</head>

<body>

<!-- AI CHAT -->

<div class="chat">

<div class="header">
🤖 AI Website Builder
</div>

<div class="messages" id="chat">

<div class="msg ai">
Hello 👋 I'm your AI website designer.<br><br>
Tell me what kind of website you want.
</div>

</div>

<div class="inputBox">

<input id="text" placeholder="Describe your website idea...">

<button class="send" onclick="send()">➤</button>

</div>

</div>

<!-- WEBSITE PREVIEW -->

<div class="preview">

<div class="previewTop">
<span>Live Website Preview</span>
<button class="createBtn" onclick="generate()">Generate Website</button>
</div>

<iframe id="frame"></iframe>

</div>

<script>

let description=""

function send(){

let input=document.getElementById("text")
let chat=document.getElementById("chat")

if(!input.value) return

description+=input.value+" "

chat.innerHTML+=`<div class="msg user">${input.value}</div>`

chat.innerHTML+=`<div class="msg ai">Nice! Tell me more about your website style.</div>`

input.value=""

chat.scrollTop=chat.scrollHeight

}

/* GENERATE WEBSITE */

function generate(){

let html=`

<html>
<head>
<style>
body{
font-family:Arial;
margin:0;
text-align:center;
}

header{
background:#ff7b00;
color:white;
padding:50px;
}

section{
padding:40px;
}

button{
padding:12px 25px;
background:#ff7b00;
border:none;
color:white;
border-radius:6px;
}

</style>
</head>

<body>

<header>
<h1>My AI Generated Website</h1>
<p>${description}</p>
</header>

<section>
<h2>About Us</h2>
<p>This website was generated by AI.</p>
</section>

<section>
<button>Contact Us</button>
</section>

</body>
</html>

`

document.getElementById("frame").srcdoc=html

}

</script>

</body>
</html>
